<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下载安装包</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#050a1a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}

#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}

.banner{text-align:center;padding:60px 20px}
.banner h1{font-size:48px;margin-bottom:10px;text-shadow:0 0 25px #00ccff;color:#00ccff}

footer{text-align:center;padding:30px;margin-top:60px;color:#666;position:fixed;bottom:0;width:100%}
</style>
</head>

<body>
<div id="particles"></div>

<div class="banner">
    <h1>下载安装包</h1>
</div>

<footer>© 2026 www.Joey91.com</footer>

<script>
// 粒子效果保留（主题不变）
const part=document.getElementById("particles");
for(let i=0;i<50;i++){
    let d=document.createElement("div");
    d.style.cssText="position:absolute;width:3px;height:3px;background:#00ccff;border-radius:50%;opacity:"+(Math.random()*0.6+0.2)+";left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;box-shadow:0 0 8px #00ccff";
    part.appendChild(d);
}
</script>
</body>
</html>
