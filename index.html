    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#050a1a;color:#fff;min-height:100vh;display:flex;flex-direction:column}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}

        nav{background:rgba(10,15,35,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(100,120,255,.3);padding:16px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99}
        .logo{font-size:24px;font-weight:bold;color:#00ccff;text-shadow:0 0 12px #00ccff}
        .nav-links a{color:#fff;margin:0 16px;text-decoration:none;font-size:16px}
        .nav-links a:hover{color:#00ccff;text-shadow:0 0 8px #00ccff}
        .menu-btn{display:none;color:#fff;font-size:24px;cursor:pointer}

        .banner{text-align:center;padding:60px 20px}
        .banner h1{font-size:48px;margin-bottom:10px;text-shadow:0 0 25px #00ccff;color:#00ccff}

        .container{max-width:1200px;margin:0 auto;padding:20px;flex:1}

        .menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;margin-top:20px}
        .menu-card{padding:25px;background:rgba(20,25,50,.7);border:1px solid rgba(0,204,255,.3);border-radius:12px;cursor:pointer;transition:all 0.3s ease;text-align:center}
        .menu-card:hover{transform:scale(1.03);box-shadow:0 0 20px rgba(0,204,255,.4);border-color:#00ccff}
        .menu-card h3{color:#00ccff;margin-bottom:10px;font-size:20px}
        .menu-card p{color:#ccc;font-size:14px;line-height:1.5}
        .menu-card .icon{font-size:48px;margin-bottom:15px}

        .sub-menu{display:none;padding:20px;background:rgba(10,15,35,.5);border-radius:8px;margin-top:15px}
        .sub-menu.active{display:block}
        .sub-menu a{display:block;padding:12px 20px;color:#ccc;text-decoration:none;border-radius:6px;transition:all 0.2s}
        .sub-menu a:hover{background:rgba(0,204,255,.2);color:#00ccff}

        footer{text-align:center;padding:30px;color:#666;width:100%}

        @media(max-width:768px){
            .menu-btn{display:block}
            .nav-links{display:none;position:absolute;top:100%;left:0;width:100%;background:rgba(10,15,35,.95);flex-direction:column;padding:20px}
            .nav-links.active{display:flex}
            .nav-links a{margin:10px 0}
        }
    </style>
</head>
<body>

                </div>
            </div>

            <div class="menu-card" onclick="toggleSub(this)">

    <script>
        const part=document.getElementById("particles");
        for(let i=0;i<50;i++){
            let d=document.createElement("div");
            d.style.cssText="position:absolute;width:3px;height:3px;background:#00ccff;border-radius:50%;opacity:"+(Math.random()*0.6+0.2)+";left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;box-shadow:0 0 8px #00ccff";
            part.appendChild(d);
        }

        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }

        function toggleSub(card){
            const sub=card.querySelector(".sub-menu");
            sub.classList.toggle("active");
        }
    </script>
</body>
</html>
